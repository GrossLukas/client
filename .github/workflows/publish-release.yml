name: Publish Release

# Publishes a GitHub release (creating the tag) from the packages a previous
# "ownCloud CI" run built, so no rebuild is needed. Triggered manually.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create (e.g. v7.5.0)'
        required: true
        default: 'v7.5.0'
      run_id:
        description: 'ownCloud CI run id to take the packages from'
        required: true
        default: '29095326052'

permissions:
  contents: write # create the tag + release and upload assets
  actions: read # download the CI run's artifacts

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Download packages from CI run
        run: gh run download "${{ inputs.run_id }}" -R "$GITHUB_REPOSITORY" --dir packages

      - name: Prepare release assets
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          VER="${TAG#v}"
          mkdir -p assets
          # flatten the artifacts, dropping craft bookkeeping files; the per-file
          # .sha256 files are regenerated below because the assets get renamed
          find packages -type f \
            ! -name 'manifest*.json' ! -name '.craft.shelf' ! -name '*.sha256' \
            -exec cp {} assets/ \;
          cd assets
          for f in *; do
            case "$f" in
              *-Setup.exe) mv "$f" "owncloud.online-client-${VER}-win-x64-Setup.exe" ;;
              *.exe)      mv "$f" "owncloud.online-client-${VER}-win-x64.exe" ;;
              *.7z)       mv "$f" "owncloud.online-client-${VER}-win-x64.7z" ;;
              *.AppImage) mv "$f" "owncloud.online-client-${VER}-linux-x86_64.AppImage" ;;
            esac
          done
          sha256sum * > SHA256SUMS.txt
          ls -la

      - name: Create release
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          VER="${TAG#v}"
          cat > notes.md <<EOF
          Release ${VER} des owncloud.online Desktop-Clients.

          **Pakete**
          - \`owncloud.online-client-${VER}-win-x64-Setup.exe\` — **empfohlener Windows-Installer**: beendet einen laufenden Client, installiert und führt den für die Explorer-Integration nötigen Windows-Neustart aus. Silent: \`/S\` (startet automatisch neu), Neustart unterdrücken: \`/S /norestart\` (z. B. für baramundi-Jobs mit eigener Reboot-Steuerung).
          - \`owncloud.online-client-${VER}-win-x64.exe\` — Basis-Installer ohne Neustart-Logik
          - \`owncloud.online-client-${VER}-win-x64.7z\` — Windows portabel
          - \`owncloud.online-client-${VER}-linux-x86_64.AppImage\` — Linux
          - \`SHA256SUMS.txt\` — Prüfsummen aller Pakete

          Änderungsdetails: siehe \`changelog/\` im Repository. macOS ist derzeit kein Release-Target (FileProvider-VFS in Arbeit).
          EOF
          gh release create "$TAG" -R "$GITHUB_REPOSITORY" \
            --target master \
            --title "owncloud.online Client ${VER}" \
            --notes-file notes.md \
            assets/*
